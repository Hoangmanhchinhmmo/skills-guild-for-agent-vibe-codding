name: Welcome First-Time Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to the Vibe Coding Skills Guild! Thanks for opening your first issue here.

            We're glad you're contributing to the community. If you haven't already, please check out our CONTRIBUTING.md guide in the repo root for tips on how to get involved.

            Happy vibe coding!
          pr-message: |
            Welcome to the Vibe Coding Skills Guild! Thanks for opening your first pull request here.

            We appreciate your contribution! If you haven't already, please review our CONTRIBUTING.md guide in the repo root to make sure everything is in order.

            Happy vibe coding!
