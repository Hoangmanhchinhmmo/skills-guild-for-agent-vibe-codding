name: Validate Links

on:
  schedule:
    - cron: "0 8 * * *" # Runs daily at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in Markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--verbose --no-progress '**/*.md'"
          output: ./lychee/out.md
          fail: true

      - name: Check for existing issue
        if: failure()
        id: check
        run: |
          EXISTING=$(gh issue list --label bug --search "Broken links detected" --state open --json number --jq length)
          echo "exists=$EXISTING" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links
        if: failure() && steps.check.outputs.exists == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('./lychee/out.md')
              ? fs.readFileSync('./lychee/out.md', 'utf8')
              : 'Broken links were detected. Check the workflow run for details.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Broken links detected',
              body: `## Broken Links Report\n\n${body}\n\n---\n_This issue was created automatically by the link validation workflow._`,
              labels: ['bug']
            });
